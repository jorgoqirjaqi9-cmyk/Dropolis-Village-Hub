kind = "web"
previewPath = "/"
title = "Dropolis"
version = "1.0.0"
id = "artifacts/dropolis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20727

[services.development]
run = "pnpm --filter @workspace/dropolis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dropolis", "run", "build" ]
publicDir = "artifacts/dropolis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20727"
BASE_PATH = "/"
