openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Dropolis API - Portal for Dropolë villages
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: articles
    description: News articles
  - name: villages
    description: Villages of Dropolë
  - name: photos
    description: Photo gallery
  - name: videos
    description: Video gallery
  - name: chat
    description: Live chat
  - name: stats
    description: Dashboard stats
  - name: social
    description: Social media post generation
  - name: news-submissions
    description: User news submissions for editorial review
  - name: video-submissions
    description: User video uploads for moderation

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List articles
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: village
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
    post:
      operationId: createArticle
      tags: [articles]
      summary: Create article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /articles/featured:
    get:
      operationId: getFeaturedArticles
      tags: [articles]
      summary: Get featured articles for homepage
      responses:
        "200":
          description: Featured articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"

  /articles/trending:
    get:
      operationId: getTrendingArticles
      tags: [articles]
      summary: Get trending articles by score
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Trending articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"

  /articles/recalculate-scores:
    post:
      operationId: recalculateArticleScores
      tags: [articles]
      summary: Recalculate scores for all articles
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                type: object
                required: [ok, updated]
                properties:
                  ok:
                    type: boolean
                  updated:
                    type: integer

  /articles/categories:
    get:
      operationId: listCategories
      tags: [articles]
      summary: List article categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /articles/{id}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get article by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found
    patch:
      operationId: updateArticle
      tags: [articles]
      summary: Update article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /villages:
    get:
      operationId: listVillages
      tags: [villages]
      summary: List all villages
      responses:
        "200":
          description: List of villages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Village"
    post:
      operationId: createVillage
      tags: [villages]
      summary: Create a village
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VillageInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Village"

  /villages/{id}:
    get:
      operationId: getVillage
      tags: [villages]
      summary: Get village by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Village
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Village"
        "404":
          description: Not found
    delete:
      operationId: deleteVillage
      tags: [villages]
      summary: Delete a village
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
    patch:
      operationId: updateVillage
      tags: [villages]
      summary: Update a village
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VillageUpdateInput"
      responses:
        "200":
          description: Updated village
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Village"
        "404":
          description: Not found

  /photos:
    get:
      operationId: listPhotos
      tags: [photos]
      summary: List photos
      parameters:
        - name: village_id
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
    post:
      operationId: createPhoto
      tags: [photos]
      summary: Add a photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"

  /photos/{id}:
    get:
      operationId: getPhoto
      tags: [photos]
      summary: Get photo by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
    delete:
      operationId: deletePhoto
      tags: [photos]
      summary: Delete a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /photos/{id}/like:
    post:
      operationId: likePhoto
      tags: [photos]
      summary: Add a like to a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated vote counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResponse"
    delete:
      operationId: unlikePhoto
      tags: [photos]
      summary: Remove a like from a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated vote counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResponse"

  /photos/{id}/dislike:
    post:
      operationId: dislikePhoto
      tags: [photos]
      summary: Add a dislike to a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated vote counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResponse"
    delete:
      operationId: undislikePhoto
      tags: [photos]
      summary: Remove a dislike from a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated vote counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResponse"

  /photos/upload-url:
    post:
      operationId: requestPhotoUploadUrl
      tags: [photos]
      summary: Request a presigned URL for photo upload (validates type & size)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoUploadUrlRequest"
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /photos/submit:
    post:
      operationId: submitPhoto
      tags: [photos]
      summary: Submit a photo for moderation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PhotoSubmission"
      responses:
        "201":
          description: Submitted — pending review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photo"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/photos:
    get:
      operationId: listAdminPhotos
      tags: [photos]
      summary: List photos by status (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of admin photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminPhoto"
        "401":
          description: Unauthorized

  /admin/photos/{id}/approve:
    put:
      operationId: approvePhoto
      tags: [photos]
      summary: Approve a pending photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPhoto"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /admin/photos/{id}:
    delete:
      operationId: rejectPhoto
      tags: [photos]
      summary: Reject and delete a photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Rejected and deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /news-submissions:
    post:
      operationId: createNewsSubmission
      tags: [news-submissions]
      summary: Submit a news article for editorial review (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsSubmissionCreate"
      responses:
        "201":
          description: Submission received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsSubmissionResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    get:
      operationId: listNewsSubmissions
      tags: [news-submissions]
      summary: List submissions (admin only)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsSubmission"
        "401":
          description: Unauthorized

  /news-submissions/{id}:
    patch:
      operationId: updateNewsSubmission
      tags: [news-submissions]
      summary: Approve or reject a submission (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsSubmissionStatusUpdate"
      responses:
        "200":
          description: Updated submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsSubmission"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteNewsSubmission
      tags: [news-submissions]
      summary: Delete a submission (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [photos]
      summary: Request a generic presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /videos:
    get:
      operationId: listVideos
      tags: [videos]
      summary: List videos
      parameters:
        - name: village_id
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of videos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Video"
    post:
      operationId: createVideo
      tags: [videos]
      summary: Add a video
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VideoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Video"

  /video-submissions/upload-url:
    post:
      operationId: requestVideoUploadUrl
      tags: [video-submissions]
      summary: Request a presigned URL for video file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestVideoUploadUrlBody"
      responses:
        "200":
          description: Presigned URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /video-submissions/submit:
    post:
      operationId: submitVideo
      tags: [video-submissions]
      summary: Submit a user-uploaded video for moderation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitVideoBody"
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoSubmissionResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "429":
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/video-submissions:
    get:
      operationId: listVideoSubmissions
      tags: [video-submissions]
      summary: List video submissions (admin only)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: List of submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VideoSubmission"
        "401":
          description: Unauthorized

  /admin/video-submissions/{id}/approve:
    put:
      operationId: approveVideoSubmission
      tags: [video-submissions]
      summary: Approve a video submission (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoSubmission"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /admin/video-submissions/{id}/reject:
    put:
      operationId: rejectVideoSubmission
      tags: [video-submissions]
      summary: Reject a video submission (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VideoSubmission"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /admin/video-submissions/{id}:
    delete:
      operationId: deleteVideoSubmission
      tags: [video-submissions]
      summary: Delete a video submission (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /votes:
    post:
      operationId: castVote
      tags: [votes]
      summary: Cast a like or dislike vote on content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteRequest"
      responses:
        "200":
          description: Updated vote counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResult"
        "400":
          description: Bad request
        "404":
          description: Content not found or not public
        "429":
          description: Rate limit exceeded

  /chat/messages:
    get:
      operationId: listChatMessages
      tags: [chat]
      summary: Get chat messages
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Chat messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a chat message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "201":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessage"

  /chat/messages/{id}:
    delete:
      operationId: deleteChatMessage
      tags: [chat]
      summary: Delete a chat message (own messages only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: username
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "403":
          description: Not your message
        "404":
          description: Not found

  /chat/presence:
    get:
      operationId: getChatPresence
      tags: [chat]
      summary: Get number of online users
      responses:
        "200":
          description: Online user count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatPresence"
    post:
      operationId: pingChatPresence
      tags: [chat]
      summary: Register as online
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatPresenceInput"
      responses:
        "200":
          description: Online user count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatPresence"

  /social/publish/{id}:
    post:
      operationId: publishSocialPost
      tags: [social]
      summary: Generate social media post content for an article
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Generated social media content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialPost"
        "404":
          description: Article not found

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get site statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteStats"

components:
  schemas:
    ChatPresence:
      type: object
      required: [online]
      properties:
        online:
          type: integer

    ChatPresenceInput:
      type: object
      required: [username]
      properties:
        username:
          type: string

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Article:
      type: object
      required: [id, title, content, category, author, createdAt, published]
      properties:
        id:
          type: integer
        title:
          type: string
        excerpt:
          type: ["string", "null"]
        content:
          type: string
        category:
          type: string
        author:
          type: string
        imageUrl:
          type: ["string", "null"]
        villageName:
          type: ["string", "null"]
        tags:
          type: ["string", "null"]
        seoTitle:
          type: ["string", "null"]
        metaDescription:
          type: ["string", "null"]
        slug:
          type: ["string", "null"]
        score:
          type: integer
        viewCount:
          type: integer
        published:
          type: boolean
        featured:
          type: boolean
        likesCount:
          type: integer
        dislikesCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    ArticleInput:
      type: object
      required: [title, content, category, author]
      properties:
        title:
          type: string
        excerpt:
          type: string
        content:
          type: string
        category:
          type: string
        author:
          type: string
        imageUrl:
          type: string
        villageName:
          type: string
        tags:
          type: string
        seoTitle:
          type: string
        metaDescription:
          type: string
        slug:
          type: string
        published:
          type: boolean
        featured:
          type: boolean

    ArticleUpdate:
      type: object
      properties:
        title:
          type: string
        excerpt:
          type: string
        content:
          type: string
        category:
          type: string
        author:
          type: string
        imageUrl:
          type: string
        villageName:
          type: string
        tags:
          type: string
        seoTitle:
          type: string
        metaDescription:
          type: string
        slug:
          type: string
        score:
          type: integer
        published:
          type: boolean
        featured:
          type: boolean

    SocialPost:
      type: object
      required: [articleId, articleTitle, fbPost, shortCaption, hashtags]
      properties:
        articleId:
